; Local pytest config for the pure-Python Autellix policy-core tests.
;
; Its presence makes this directory the pytest rootdir when the suite is
; invoked as ``pytest tests/v1/core/sched/autellix/``. That confines conftest
; discovery to this subtree, so the torch-heavy repo-root ``tests/conftest.py``
; is not imported and the tests run in a minimal (no vLLM/torch) environment.
[pytest]
